<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entité - Gestion Multi-Entités</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <button id="backBtn" class="btn-icon">← Retour</button>
                <h1 id="entityName"></h1>
            </div>
            <div class="header-right">
                <button id="logoutBtn" class="btn-logout">🚪</button>
            </div>
        </header>
        
        <main class="app-main">
            <div class="entity-summary">
                <div class="summary-card">
                    <div class="summary-label">Solde actuel</div>
                    <div class="summary-value" id="balance">0 FCFA</div>
                </div>
                <div class="summary-card income">
                    <div class="summary-label">Total entrées</div>
                    <div class="summary-value" id="totalIncome">0 FCFA</div>
                </div>
                <div class="summary-card expense">
                    <div class="summary-label">Total sorties</div>
                    <div class="summary-value" id="totalExpense">0 FCFA</div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="addIncomeBtn" class="btn-income">➕ Entrée</button>
                <button id="addExpenseBtn" class="btn-expense">➖ Sortie</button>
            </div>
            
            <div class="transactions-section">
                <h3>📜 Historique des opérations</h3>
                <div class="table-container">
                    <table id="transactionsTable">
                        <thead>
                            <tr><th>Date</th><th>Type</th><th>Montant</th><th>Description</th><th>Action</th></tr>
                        </thead>
                        <tbody id="transactionsBody">
                            <tr><td colspan="5">Chargement...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Ajouter une transaction</h3>
                <span class="close">&times;</span>
            </div>
            <form id="transactionForm">
                <div class="form-group">
                    <label>Montant (FCFA)</label>
                    <input type="number" id="amount" step="1" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="description" placeholder="Ex: Vente du jour">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
                <button type="submit" class="btn-primary">Enregistrer</button>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
